<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>공동 업무표</title><link rel="stylesheet" href="/style.css"></head><body>
<header class="app-header"><div><p class="eyebrow">LIVE SHARED WORKSPACE</p><h1 id="pageTitle">시간외근무 공동작성표</h1><p class="sub">입력 내용은 자동 저장되며 모든 접속자에게 실시간 반영됩니다.</p></div><div class="status"><span id="dot"></span><strong id="connection">연결 중</strong><small id="saved">저장 대기</small></div></header>
<nav class="tabs" aria-label="업무표 선택"><button data-type="overtime" class="active">시간외근무표</button><button data-type="weekly">주간계획</button><button data-type="vehicle">차량일지</button></nav>
<main>
<section class="period-bar"><button id="prev" aria-label="이전 기간">‹</button><div><span id="periodLabel"></span><input id="monthPicker" type="month"><input id="weekPicker" type="date"></div><button id="next" aria-label="다음 기간">›</button></section>
<section class="toolbar"><div class="summary"><div><span>작성 건수</span><strong id="count">0</strong></div><div id="totalBox"><span>총 시간</span><strong id="total">0시간</strong></div></div><div class="actions"><button id="add" class="primary">＋ 행 추가</button><a id="excel" class="button" href="#">Excel 다운로드</a><a id="scheduleExcel" class="button overtime-only" href="#">개인세부내역 양식</a><a id="confirmExcel" class="button overtime-only" href="#">확인표 양식</a><button id="print">인쇄</button></div></section>
<section class="sheet-wrap"><table id="sheet"><thead></thead><tbody></tbody></table><div id="empty">아직 작성된 내용이 없습니다.<br><button onclick="document.querySelector('#add').click()">첫 행 추가하기</button></div></section>
<p class="hint" id="hint">날짜 순으로 자동 정렬됩니다. Tab 키로 다음 칸으로 이동할 수 있습니다.</p>
</main>
<section class="print-head" aria-hidden="true"><div class="print-title"><h2 id="printTitle"></h2><p id="printPeriod"></p></div><table class="approval"><tr><th>담당</th><th>팀장</th><th>부장</th><th>국장</th><th>관장</th></tr><tr><td></td><td></td><td></td><td></td><td></td></tr></table></section>
<div class="stamp-box" aria-hidden="true"><span>직인</span></div>
<script src="/socket.io/socket.io.js"></script><script src="/app.js"></script></body></html>
